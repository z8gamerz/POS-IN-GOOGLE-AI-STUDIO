<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e40" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7c2d12" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Rounded Background -->
  <rect width="472" height="472" x="20" y="20" rx="100" fill="url(#bgGrad)" filter="url(#shadow)" />

  <!-- Stylized Shopping Cart & Digital POS Concept -->
  <g transform="translate(116, 116)" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cart Basket -->
    <path d="M20 20 h40 l40 160 h140 l30 -110 h-190" stroke-width="26" />
    
    <!-- Wheels -->
    <circle cx="105" cy="230" r="18" fill="#ffffff" stroke="none" />
    <circle cx="215" cy="230" r="18" fill="#ffffff" stroke="none" />

    <!-- POS Digital Checkmark (Acknowledging a complete transaction) -->
    <path d="M120 70 l30 30 l60 -60" stroke="#ffffff" stroke-width="22" stroke-dasharray="none" />
  </g>
</svg>
